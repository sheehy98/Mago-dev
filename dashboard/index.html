<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mago Dev Dashboard</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    /* Reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Theme */
    :root {
      --bg: #1a1a2e;
      --bg-card: #16213e;
      --bg-console: #0f0f1a;
      --border: #2a2a4a;
      --text: #e0e0e0;
      --text-dim: #888;
      --green: #4ade80;
      --red: #f87171;
      --blue: #60a5fa;
      --yellow: #fbbf24;
      --orange: #fb923c;
      --purple: #a78bfa;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
      max-width: 960px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-dim);
    }

    /* Mode selector */
    .mode-selector {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .mode-btn {
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: 0;
      background: var(--bg);
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .mode-btn:not(:last-child) { border-right: 1px solid var(--border); }
    .mode-btn:hover { color: var(--text); }
    .mode-btn.active-dev { background: var(--green); color: var(--bg); font-weight: 600; }
    .mode-btn.active-staging { background: var(--orange); color: var(--bg); font-weight: 600; }
    .mode-btn.active-remote { background: var(--purple); color: var(--bg); font-weight: 600; }

    /* Section */
    .section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .section.hidden { display: none; }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .mode-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: var(--green);
      color: var(--bg);
    }
    .mode-badge.staging { background: var(--orange); }
    .mode-badge.remote { background: var(--purple); }

    /* Status cards */
    .status-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }
    .status-card {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--bg);
      border-radius: 6px;
      font-size: 14px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
    }
    .status-dot.running { background: var(--green); }
    .status-dot.unknown { background: var(--text-dim); }
    .status-port {
      font-size: 12px;
      color: var(--text-dim);
      margin-left: auto;
    }

    /* Button grid */
    .btn-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .columns {
      display: flex;
      gap: 16px;
    }
    .columns > div { flex: 1; }

    /* Buttons */
    button {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    button:hover { border-color: var(--blue); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .toggle-row label {
      font-size: 13px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    /* Console */
    .console-output {
      background: var(--bg-console);
      border: 1px solid var(--border);
      border-radius: 0 0 6px 6px;
      padding: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.6;
      height: 360px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
    }
    .console-output.active { display: block; }
    .console-output .line { color: var(--text-dim); }
    .console-output .info { color: var(--blue); }
    .console-output .success { color: var(--green); }
    .console-output .error { color: var(--red); }

    /* Console header */
    .console-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 0;
    }
    .console-header .section-title { margin-bottom: 0; }

    /* Tabs */
    .tab-bar {
      display: flex;
      gap: 0;
      flex: 1;
      overflow-x: auto;
      min-width: 0;
    }
    .tab {
      padding: 6px 14px;
      font-size: 12px;
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      background: var(--bg);
      color: var(--text-dim);
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      background: var(--bg-console);
      color: var(--text);
      border-color: var(--border);
    }
    .tab .tab-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--yellow);
    }
    .tab .tab-dot.done { background: var(--green); }
    .tab .tab-dot.failed { background: var(--red); }
    .tab .tab-close {
      font-size: 14px;
      color: var(--text-dim);
      cursor: pointer;
      margin-left: 2px;
      line-height: 1;
    }
    .tab .tab-close:hover { color: var(--text); }

    /* Clear all button */
    .clear-btn {
      padding: 4px 10px;
      font-size: 11px;
      flex-shrink: 0;
    }

    /* Empty state */
    .console-empty {
      background: var(--bg-console);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 48px 12px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Mago Dev Dashboard</h1>
    <div class="mode-selector">
      <button class="mode-btn active-dev" id="mode-btn-dev" onclick="setMode('dev')">Dev</button>
      <button class="mode-btn" id="mode-btn-staging" onclick="setMode('staging')">Staging</button>
      <button class="mode-btn" id="mode-btn-remote" onclick="setMode('remote')">Remote</button>
    </div>
  </div>

  <!-- Service Status -->
  <div class="section">
    <div class="section-title">Services <span class="mode-badge" id="badge-services">Dev</span></div>
    <div class="status-row">
      <div class="status-card">
        <div class="status-dot" id="dot-postgresql"></div>
        <span>PostgreSQL</span>
        <span class="status-port" id="port-postgresql"></span>
      </div>
      <div class="status-card">
        <div class="status-dot" id="dot-minio"></div>
        <span>MinIO</span>
        <span class="status-port" id="port-minio"></span>
      </div>
      <div class="status-card">
        <div class="status-dot" id="dot-api"></div>
        <span>API</span>
        <span class="status-port" id="port-api"></span>
      </div>
      <div class="status-card">
        <div class="status-dot" id="dot-frontend"></div>
        <span>Frontend</span>
        <span class="status-port" id="port-frontend"></span>
      </div>
    </div>
    <div class="btn-grid" id="local-service-btns">
      <button onclick="runCommand('services/launch')">Launch All</button>
      <button onclick="runCommand('services/kill')">Kill All</button>
    </div>
  </div>

  <!-- Remote Deployment (visible only in remote mode) -->
  <div class="section hidden" id="remote-section">
    <div class="section-title">Remote Deployment <span class="mode-badge remote">Remote</span></div>
    <div class="btn-grid">
      <button onclick="runCommand('remote/deploy')">Deploy</button>
      <button onclick="runCommand('remote/restart')">Restart</button>
      <button onclick="runCommand('remote/sync')">Sync Code</button>
      <button onclick="runCommand('remote/kill')">Kill Remote</button>
      <button onclick="runCommand('remote/tunnel')">Start Tunnel</button>
      <button onclick="runCommand('remote/status')">Docker Status</button>
      <button onclick="runCommand('remote/logs')">View Logs</button>
    </div>
  </div>

  <!-- ETL + Validation -->
  <div class="columns">

    <!-- ETL (local, hidden in remote mode) -->
    <div class="section" id="etl-section">
      <div class="section-title">ETL <span class="mode-badge" id="badge-etl">Dev</span></div>
      <div class="btn-grid">
        <button onclick="runCommand('etl/reset-tables')">Reset Tables</button>
        <button onclick="runCommand('etl/reset-buckets')">Reset Buckets</button>
        <button onclick="runCommand('etl/reset-all')">Reset All</button>
      </div>
      <div class="btn-grid" style="margin-top: 8px;">
        <button onclick="runCommand('etl/snapshot-tables')">Snapshot Tables</button>
        <button onclick="runCommand('etl/snapshot-buckets')">Snapshot Buckets</button>
        <button onclick="runCommand('etl/snapshot-all')">Snapshot All</button>
      </div>
    </div>

    <!-- Remote ETL (visible only in remote mode) -->
    <div class="section hidden" id="remote-etl-section">
      <div class="section-title">ETL <span class="mode-badge remote">Remote</span></div>
      <div class="btn-grid">
        <button onclick="runCommand('remote/etl/reset-tables')">Reset Tables</button>
        <button onclick="runCommand('remote/etl/reset-buckets')">Reset Buckets</button>
        <button onclick="runCommand('remote/etl/reset-all')">Reset All</button>
      </div>
      <div class="btn-grid" style="margin-top: 8px;">
        <button onclick="runCommand('remote/etl/snapshot-tables')">Snapshot Tables</button>
        <button onclick="runCommand('remote/etl/snapshot-buckets')">Snapshot Buckets</button>
        <button onclick="runCommand('remote/etl/snapshot-all')">Snapshot All</button>
      </div>
    </div>

    <!-- Validation -->
    <div class="section">
      <div class="section-title">Validation</div>
      <div class="btn-grid">
        <button onclick="runCommand('validate/catalog')">Validate Catalog</button>
        <button onclick="runCommand('validate/translations')">Validate Translations</button>
        <button onclick="runCommand('validate/all')">Validate All</button>
        <button onclick="runCommand('data/generate-translations')">Generate Translations</button>
      </div>
    </div>
  </div>

  <!-- Lint + Tests -->
  <div class="columns">

    <!-- Lint -->
    <div class="section">
      <div class="section-title">Lint</div>
      <div class="btn-grid">
        <button onclick="runCommand('lint/bash')">Bash</button>
        <button onclick="runCommand('lint/python')">Python</button>
        <button onclick="runCommand('lint/frontend')">Frontend</button>
        <button onclick="runCommand('lint/all')">Lint All</button>
      </div>
    </div>

    <!-- Tests -->
    <div class="section">
      <div class="section-title">Tests</div>
      <div class="toggle-row">
        <button onclick="runApiTests()">API Tests</button>
        <label><input type="checkbox" id="coverage-toggle" checked> Coverage</label>
      </div>
      <div class="toggle-row">
        <button onclick="runBrowserTests()">Browser Tests</button>
        <label><input type="checkbox" id="headed-toggle"> Headed</label>
      </div>
    </div>
  </div>

  <!-- Console -->
  <div class="section">
    <div class="console-header">
      <div class="section-title">Output</div>
      <div class="tab-bar" id="tab-bar"></div>
      <button class="clear-btn" onclick="copyActiveTab()">Copy</button>
      <button class="clear-btn" onclick="closeAllTabs()">Clear All</button>
    </div>
    <div id="console-container">
      <div class="console-empty" id="console-empty">Run a command to see output here</div>
    </div>
  </div>

  <script>
    //
    // State
    //

    // Each task: { id, key, status, el, tab, es }
    const openTasks = [];
    let activeTaskId = null;
    let currentMode = 'dev';
    let pollTimer = null;

    //
    // Mode Selector
    //

    async function setMode(mode) {
      try {
        const res = await fetch('/mode/' + mode, { method: 'POST' });
        const data = await res.json();
        currentMode = data.mode;
        updateModeUI();
        refreshStatus();

        // Persist mode in URL
        const url = new URL(window.location);
        url.searchParams.set('mode', currentMode);
        history.replaceState(null, '', url);
      } catch (e) {
        console.error('Mode switch failed:', e);
      }
    }

    function updateModeUI() {
      // Update radio buttons
      const modes = ['dev', 'staging', 'remote'];
      for (const m of modes) {
        const btn = document.getElementById('mode-btn-' + m);
        btn.className = 'mode-btn' + (currentMode === m ? ' active-' + m : '');
      }

      // Update badges
      const badgeLabels = { dev: 'Dev', staging: 'Staging', remote: 'Remote' };
      const badgeIds = ['badge-services', 'badge-etl'];
      for (const id of badgeIds) {
        const badge = document.getElementById(id);
        badge.textContent = badgeLabels[currentMode];
        badge.className = 'mode-badge' + (currentMode !== 'dev' ? ' ' + currentMode : '');
      }

      // Show/hide remote section
      document.getElementById('remote-section').classList.toggle('hidden', currentMode !== 'remote');

      // Show/hide local service buttons (not needed in remote mode)
      document.getElementById('local-service-btns').style.display = currentMode === 'remote' ? 'none' : '';

      // Swap local/remote ETL sections
      document.getElementById('etl-section').classList.toggle('hidden', currentMode === 'remote');
      document.getElementById('remote-etl-section').classList.toggle('hidden', currentMode !== 'remote');

      // Reset polling interval
      startPolling();
    }

    // Restore mode from URL param, or fetch from server
    const urlMode = new URL(window.location).searchParams.get('mode');
    if (urlMode && ['dev', 'staging', 'remote'].includes(urlMode)) {
      setMode(urlMode);
    } else {
      fetch('/mode').then(r => r.json()).then(data => {
        currentMode = data.mode;
        updateModeUI();
      }).catch(() => {});
    }

    //
    // Status Polling
    //

    function startPolling() {
      if (pollTimer) clearInterval(pollTimer);

      // Adaptive interval: 500ms for local, 30s for remote
      const interval = currentMode === 'remote' ? 30000 : 500;
      pollTimer = setInterval(refreshStatus, interval);
    }

    async function refreshStatus() {
      try {
        const res = await fetch('/status');
        const data = await res.json();

        for (const [name, info] of Object.entries(data.services)) {
          const dot = document.getElementById('dot-' + name);
          const port = document.getElementById('port-' + name);

          if (dot) {
            // In remote mode, PostgreSQL status is unknown
            if (currentMode === 'remote' && !info.url && !info.port) {
              dot.className = 'status-dot unknown';
            } else {
              dot.className = 'status-dot' + (info.running ? ' running' : '');
            }
          }

          if (port) {
            // Show URL for remote, port for local
            if (info.url) {
              port.textContent = info.url.replace('https://', '');
            } else if (info.port) {
              port.textContent = ':' + info.port;
            } else {
              port.textContent = '';
            }
          }
        }
      } catch (e) {
        // Dashboard server is down
      }
    }

    // Initial poll
    refreshStatus();
    startPolling();

    //
    // Tab Management
    //

    const tabBar = document.getElementById('tab-bar');
    const container = document.getElementById('console-container');
    const emptyState = document.getElementById('console-empty');

    // Format command key into a short label
    function formatLabel(key) {
      const parts = key.split('/');
      return parts[parts.length - 1];
    }

    // Switch to a specific task tab
    function switchTab(taskId) {
      activeTaskId = taskId;

      for (const t of openTasks) {
        const isActive = t.id === taskId;
        t.el.classList.toggle('active', isActive);
        t.tab.classList.toggle('active', isActive);
      }

      // Auto-scroll the active console
      const active = openTasks.find(t => t.id === taskId);
      if (active) {
        active.el.scrollTop = active.el.scrollHeight;
      }
    }

    // Copy active tab content
    function copyActiveTab() {
      const task = openTasks.find(t => t.id === activeTaskId);
      if (!task) return;
      const text = task.el.innerText;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.clear-btn');
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
      });
    }

    // Close all tabs
    function closeAllTabs() {
      while (openTasks.length > 0) {
        const task = openTasks[0];
        if (task.es) task.es.close();
        task.el.remove();
        task.tab.remove();
        openTasks.splice(0, 1);
      }
      activeTaskId = null;
      emptyState.style.display = '';
    }

    // Close a task tab
    function closeTab(taskId) {
      const idx = openTasks.findIndex(t => t.id === taskId);
      if (idx === -1) return;

      const task = openTasks[idx];

      // Close SSE if still running
      if (task.es) {
        task.es.close();
      }

      // Remove DOM elements
      task.el.remove();
      task.tab.remove();
      openTasks.splice(idx, 1);

      // Switch to another tab or show empty state
      if (openTasks.length === 0) {
        activeTaskId = null;
        emptyState.style.display = '';
      } else if (activeTaskId === taskId) {
        switchTab(openTasks[Math.min(idx, openTasks.length - 1)].id);
      }
    }

    // Append a line to a task's console
    function appendLine(taskId, text, cls) {
      const task = openTasks.find(t => t.id === taskId);
      if (!task) return;

      const div = document.createElement('div');
      div.className = cls || 'line';

      // Strip ANSI escape codes
      div.textContent = text.replace(/\x1b\[[0-9;]*m/g, '');
      task.el.appendChild(div);

      // Auto-scroll if this tab is active
      if (activeTaskId === taskId) {
        task.el.scrollTop = task.el.scrollHeight;
      }
    }

    // Update the tab dot status
    function updateTabDot(taskId, status) {
      const task = openTasks.find(t => t.id === taskId);
      if (!task) return;

      const dot = task.tab.querySelector('.tab-dot');
      dot.className = 'tab-dot' + (status === 'completed' ? ' done' : status === 'failed' ? ' failed' : '');
    }

    //
    // Task Execution
    //

    async function runCommand(commandKey) {
      try {
        // Trigger the command
        const res = await fetch('/run/' + commandKey, { method: 'POST' });
        const data = await res.json();

        if (data.error) {
          console.error('Command error:', data.error);
          return;
        }

        const taskId = data.task_id;

        // Hide empty state
        emptyState.style.display = 'none';

        // Create console output div
        const outputEl = document.createElement('div');
        outputEl.className = 'console-output';
        container.appendChild(outputEl);

        // Create tab
        const tab = document.createElement('div');
        tab.className = 'tab';
        tab.innerHTML = '<span class="tab-dot"></span>' +
          '<span>' + formatLabel(commandKey) + '</span>' +
          '<span class="tab-close">\u00d7</span>';

        // Tab click switches to this task
        tab.addEventListener('click', function(e) {
          if (!e.target.classList.contains('tab-close')) {
            switchTab(taskId);
          }
        });

        // Close button
        tab.querySelector('.tab-close').addEventListener('click', function() {
          closeTab(taskId);
        });

        tabBar.appendChild(tab);

        // Register the task
        const task = { id: taskId, key: commandKey, status: 'running', el: outputEl, tab: tab, es: null };
        openTasks.push(task);

        // Switch to the new tab
        switchTab(taskId);

        // Add starting line
        appendLine(taskId, '> Starting: ' + commandKey, 'info');

        // Connect to SSE stream
        const es = new EventSource('/tasks/' + taskId + '/stream');
        task.es = es;

        // Regular output lines
        es.onmessage = function(e) {
          appendLine(taskId, e.data);
        };

        // Task completed event
        es.addEventListener('done', function(e) {
          const exitCode = parseInt(e.data);
          task.status = exitCode === 0 ? 'completed' : 'failed';

          if (exitCode === 0) {
            appendLine(taskId, '> Completed successfully', 'success');
          } else {
            appendLine(taskId, '> Failed (exit code ' + exitCode + ')', 'error');
          }

          updateTabDot(taskId, task.status);
          es.close();
          task.es = null;
        });

        es.onerror = function() {
          appendLine(taskId, '> Connection lost', 'error');
          task.status = 'failed';
          updateTabDot(taskId, 'failed');
          es.close();
          task.es = null;
        };

      } catch (e) {
        console.error('Run error:', e.message);
      }
    }

    //
    // Test Buttons
    //

    function runApiTests() {
      const coverage = document.getElementById('coverage-toggle').checked;
      const key = coverage ? 'tests/api' : 'tests/api-no-coverage';
      runCommand(key);
    }

    function runBrowserTests() {
      const headed = document.getElementById('headed-toggle').checked;
      const key = headed ? 'tests/browser-headed' : 'tests/browser';
      runCommand(key);
    }
  </script>

</body>
</html>
